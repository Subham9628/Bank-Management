spring.application.name=banking-app
# this is url name of home page add in after port number 
server.servlet.context-path=/online-banking

#Configuring Connection String such as (URL ,username,password)
spring.datasource.url=jdbc:mysql://localhost:3306/bank-app?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Congigure hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false