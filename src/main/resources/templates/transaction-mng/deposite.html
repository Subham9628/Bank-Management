<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Management Dashboard</title>
  <style>
  .space
  { 
     background-color:white;
     margin:30px 0px 100px 500px;
     text-align:center;
     height:auto;
     width:500px;
     border:10px solid green;
     border-radius:20px;
  }
  .head
  {
    margin:0px;
    padding:5px ;
    background-color: lightgreen;
    margin-bottom: 50px;
  }
  .space label
  { 
     font-size:30px;
     
  }
  .space input
  {
     font-size:30px;
     border-radius:20px;
     text-align:center;
     margin-bottom: 20px;
     
     
  }
  #deposite
  {
     background-color: blue;
     padding:10px 20px;
     border-radius:20px;
     font-size:20px;
  }
  #deposite:hover
  {
        background-color: navy;
  }
  #back
  {
  text-decoration:none;
   margin-right:70px;
    background-color: gray;
    padding:10px 20px;
     border-radius:20px;
     font-size:20px;
  }
  
  </style>
</head>
<body>
      <div th:insert="~{reusable-code/navbar}"></div>
      <form action="success-deposite" method="post">
     <div class="space">
		<div th:text="${msg}" style="font-size:30px ; font-weight: bold; margin-bottom: 10px;color:red;margin-top: 10px"></div>
        <div class="head"><h1 style="color:blue;">Deposite Money</h1></div>
        <label>Enter Money</label>  
        <input  type="number" placeholder="Enter Money" name="money" required><br>
        <a th:href="@{/}" id="back">Back Home </a>
        <button type="submit" value="send" id="deposite">Deposite </button>
    </div>
    </form>
   <footer>
   <div th:insert="~{reusable-code/footer2}"></div>
   <div th:insert="~{reusable-code/footer1}"></div>
   </footer>
</body>
</html>
