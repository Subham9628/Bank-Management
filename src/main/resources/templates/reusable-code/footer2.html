<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Management Dashboard</title>
  <style>
 
    .footer-links {
      display: flex;
      margin-bottom:30px;
      justify-content: center;
    }
    .footer-links a {
      width: auto;
      height: auto;
      margin-right: 30px;
      padding: 30px 50px 30px 50px;
      border: 2px solid black;
      color: black;
      font-size: 20px;
      text-decoration: none;
      border-radius: 15px;
      background-color: lightgreen;
    } 
    .footer
	{
	   position: absolute;
       bottom: 0;
       left: 0; 
       width:100%;
       color:white;
       text-align:center
    }
  </style>
</head>
<body>
  <footer>
    <div class="footer-links">
      <a  class="account">Account Management</a>
      <a class="transactions">Transactions</a>
      <a class="balance">Balance Enquiry</a>
      <a  class="customers">Customers</a>
    </div>
  </footer>
</body>
</html>
