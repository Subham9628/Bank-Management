<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Management Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f4f9;
    }
    /* Header */
      header{
      background: #1A237E;
      color: white;
      padding: 30px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0px;
    }
    .logout {
      background: #FFC107;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .logout:hover {
      background: #FFA000;
    }

    nav a {
      padding-right: 20px;
      width: 100%;
      height: 50px;
      margin-right: 20px;
      color: white;
      text-decoration: none;

    }

    nav a:hover {
      padding: 10px;
      background-color: green;
      border-radius: 10px;
    }
    .name
    {
      margin:0px;
      display: flex;
      margin-left:30px;
    }
    .name p
    {
       margin-left:30px;
       font-size:20px;
       color:lightgreen;
    }
    select
    {
      background: #1A237E;
      font-size:20px;
      border:none;
      margin:0px 20px 0px 20px;
      color:white;
    }
   option
   {
     padding:10px ;
   }
  </style>
</head>
<body>
  <header>
 <div style="font-size:20px;">TrustLink Bank</div>
   <nav class="name">
        <p th:text="${session.userName}">User Name</p>
		<p th:text="${session.accountNo}">account Number</p>
    </nav>  
    <nav class="login">
          <select onchange="location=this.value">
          <option >Customer Management</option>
          <option value="viewdetails.jsp">View Customer Details</option>
         <option value="updatecustomer.jsp">Update Customer Information</option>
         <option value="closecustomer.jsp">Close Customer Account</option>
       </select> 
      <select onchange="location=this.value"> 
      <option th:value="@{/}">Transaction</option>
        <option th:value="@{/deposite-money}">Deposite Money</option>
         <option th:value="@{/withdraw}">Withdraw Money</option>
          <option value="fundtransfer.jsp">Fund Transfer</option>
           <option th:value="@{statement}">Mini Statement</option>
       </select>
      <a th:href="@{/balance}">Balance Enquiry</a>
      <a href="" class="logout">Logout</a>
    </nav>
  </header>
</body>
</html>
